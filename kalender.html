<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Control Center · Kalender</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0B0F1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RCC">
  <meta name="mobile-web-app-capable" content="yes">

</head>
<body data-page="kalender">
  <div id="site-header"></div>

  <main class="section">
    <div class="container section-header">
      <div>
        <div class="eyebrow">Kalender</div>
        <h1 class="page-title page-title-compact">Rennkalender</h1>
        <p class="page-subtitle">Alle bisherigen und kommenden Rennen der Saison. Gefahrene Rennen führen zur Detailseite.</p>
      </div>
    </div>

    <div class="container section-spacer-top">
      <div class="calendar-toggle-row">
        <button type="button" class="btn primary calendar-toggle active" data-target="upcoming-section">Kommende Rennen</button>
        <button type="button" class="btn calendar-toggle" data-target="completed-section">Gefahrene Rennen</button>
      </div>
    </div>

    <div class="container calendar-sections">
      <section class="panel calendar-section" id="upcoming-section">
        <h3>Kommende Rennen</h3>
        <div id="upcoming-races" class="calendar-grid"></div>
      </section>

      <section class="panel calendar-section" id="completed-section">
        <h3>Gefahrene Rennen</h3>
        <div id="completed-races" class="calendar-grid"></div>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase-client.js"></script>
  <script src="assets/js/data/tracks.js"></script>
  <script src="assets/js/services/rcc-data.js"></script>
  <script src="assets/js/services/rcc-driver-context.js"></script>
  <script src="assets/js/layout.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/app.js"></script>
  <script src="assets/js/pages/kalender.js"></script>
</body>
</html>
