<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Race Control Center · Saison-Archiv</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0B0F1A">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RCC">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body data-page="saison-archiv">
  <div id="site-header"></div>

  <main class="section">
    <div class="container section-header">
      <div>
        <div class="eyebrow">Archiv</div>
        <h1 class="page-title page-title-compact" id="archive-title">Saison-Archiv</h1>
        <p class="page-subtitle" id="archive-subtitle">Komplette Ergebnistabellen aller Rennen der ausgewählten abgeschlossenen Saison.</p>
      </div>
      <a class="btn" href="kalender.html">Zurück zum Kalender</a>
    </div>

    <div class="container section-spacer-top">
      <section class="panel archive-control-panel">
        <div class="archive-select-row">
          <label for="archive-season-select-page">Saison auswählen</label>
          <select id="archive-season-select-page">
            <option value="">Saisons werden geladen...</option>
          </select>
        </div>
      </section>
    </div>

    <div class="container section-spacer-top" id="archive-race-results">
      <section class="panel">
        <div class="notice">Archiv wird geladen...</div>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/supabase-client.js"></script>
  <script defer src="assets/js/data/tracks.js"></script>
  <script defer src="assets/js/data/track-info.js"></script>
  <script defer src="assets/js/services/rcc-data.js"></script>
  <script defer src="assets/js/services/rcc-driver-context.js"></script>
  <script defer src="assets/js/layout.js"></script>
  <script defer src="assets/js/utils.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script defer src="assets/js/pages/season-archive.js"></script>
</body>
</html>
