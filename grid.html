<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Race Control Center · Grid</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <meta name="theme-color" content="#0B0F1A">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RCC">
  <meta name="mobile-web-app-capable" content="yes">
</head>
<body data-page="grid">
  <div id="site-header"></div>

  <main class="section">
    <div class="container section-header">
      <div>
        <div class="eyebrow">Grid</div>
        <h1 class="page-title page-title-compact">Spieler, KI-Bots & Fahrzeuge</h1>
        <p class="page-subtitle">Sortiert und gepaart nach Fahrzeugen.</p>
      </div>
    </div>

    <div class="container">
      <section class="panel admin-panel-wide">
        <h3>Spieler, KI-Bots & Fahrzeuge</h3>
        <div id="vehicle-pair-list" class="stack-list driver-admin-grid">Lade Fahrerzuordnungen…</div>
      </section>
    </div>
  </main>

  <div id="driver-card-modal" class="trackmap-lightbox hidden" aria-hidden="true">
    <div id="driver-card-modal-backdrop" class="trackmap-lightbox-backdrop"></div>
    <div class="trackmap-lightbox-dialog driver-card-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="driver-card-modal-title">
      <button type="button" class="trackmap-lightbox-close" id="driver-card-modal-close" aria-label="Popup schließen">×</button>
      <h3 id="driver-card-modal-title" class="trackmap-lightbox-title">Fahrerkarte</h3>
      <div id="driver-card-modal-content" class="driver-card-modal-content"></div>
    </div>
  </div>

  <div id="site-footer"></div>
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="assets/js/supabase-client.js"></script>
  <script defer src="assets/js/services/rcc-data.js"></script>
  <script defer src="assets/js/services/rcc-driver-context.js"></script>
  <script defer src="assets/js/layout.js"></script>
  <script defer src="assets/js/utils.js"></script>
  <script defer src="assets/js/app.js"></script>
  <script defer src="assets/js/pages/regeln-faq.js"></script>
</body>
</html>
